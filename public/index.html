<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>DaVinci</title>
<style>
/* ============================================================================
   PALETTE — exactly the seven brand values. No invented hues.
   Every other shade is one of these SEVEN at reduced opacity only.
   Meaning is consistent and load-bearing:
     CYAN  = technology · live · connectivity · "doing"
     GOLD  = intelligence · memory · insight · "thinking"
   ============================================================================ */
:root{
  --navy:#0B0D33; --ivory:#EAF7F7; --cyan:#89CFF0; --gold:#D4B26A;
  --island:#0C141D; --ink:#07111F; --light:#FFFFFF;
  --line:rgba(137,207,240,.10); --line-2:rgba(137,207,240,.16);
  --soft:rgba(234,247,247,.58); --softer:rgba(234,247,247,.40); --faint:rgba(234,247,247,.22);
  --cyan-dim:rgba(137,207,240,.12); --cyan-faint:rgba(137,207,240,.05);
  --gold-dim:rgba(212,178,106,.14); --gold-faint:rgba(212,178,106,.07);
  --ease:cubic-bezier(.22,.61,.36,1); --ease-out:cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--navy);color:var(--light);font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit}
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-thumb{background:var(--faint);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--softer)}
::-webkit-scrollbar-track{background:transparent}

/* ============================================================================
   LAYOUT — fixed-height grid. SCROLL FIX: every column min-height:0 so inner
   regions own their overflow; the page itself never scrolls.
   ============================================================================ */
.app{display:grid;grid-template-columns:64px auto 1fr;height:100vh;height:100dvh;overflow:hidden;transition:grid-template-columns .42s var(--ease);background:radial-gradient(1200px 600px at 12% -5%,rgba(137,207,240,.06),transparent),radial-gradient(900px 500px at 105% 110%,rgba(212,178,106,.05),transparent),var(--navy)}
.app>*{min-width:0;min-height:0}

.rail{width:64px;background:transparent;display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:5px;z-index:30}
.rail .logo{width:40px;height:40px;border-radius:12px;flex-shrink:0;margin-bottom:14px;background:linear-gradient(135deg,var(--cyan),var(--gold));color:var(--navy);display:grid;place-items:center;font-size:21px;font-weight:800;box-shadow:0 4px 18px rgba(137,207,240,.22)}
.rb{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;font-size:18px;color:var(--softer);transition:all .22s var(--ease);position:relative}
.rb:hover{background:var(--cyan-faint);color:var(--soft);transform:translateY(-1px)}
.rb:active{transform:scale(.94)}
.rb.on{background:var(--cyan-dim);color:var(--cyan)}
.rb .tip{position:absolute;left:54px;top:50%;transform:translateY(-50%) translateX(-4px);background:var(--island);border:1px solid var(--line-2);color:var(--light);font-size:12px;font-weight:500;padding:6px 11px;border-radius:9px;white-space:nowrap;opacity:0;pointer-events:none;transition:all .18s var(--ease);z-index:40;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.rb:hover .tip{opacity:1;transform:translateY(-50%) translateX(0)}
.rail .spacer{flex:1}

/* LEFT WORKSPACE — working panel + vision, switched by segmented control */
.workspace{width:340px;background:linear-gradient(180deg,rgba(12,20,29,.55),rgba(12,20,29,.35));border:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;transition:width .42s var(--ease),opacity .3s var(--ease),margin .42s var(--ease);margin:10px;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.app.no-ws{grid-template-columns:64px 0 1fr}
.app.no-ws .workspace{width:0;opacity:0;border:none;margin:10px 0}
.ws-seg{display:flex;gap:4px;padding:14px 14px 0;flex-shrink:0}
.seg{flex:1;padding:9px 6px;border-radius:10px;color:var(--softer);font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s var(--ease)}
.seg:hover{color:var(--soft)}
.seg.on{background:var(--cyan-dim);color:var(--cyan)}
.seg.on.intel{background:var(--gold-dim);color:var(--gold)}
.ws-tabs{display:flex;padding:12px 14px 0;gap:3px;flex-shrink:0}
.wtab{flex:1;padding:8px 6px;border-radius:9px 9px 0 0;color:var(--softer);font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .18s var(--ease);position:relative}
.wtab.on{color:var(--light)}
.wtab.on::after{content:"";position:absolute;left:14%;right:14%;bottom:0;height:2px;border-radius:2px;background:var(--gold)}
.wtab .badge{background:var(--gold);color:var(--navy);font-size:10px;font-weight:800;padding:1px 6px;border-radius:99px;line-height:1.4}
.ws-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 15px;min-height:0}

.center{display:flex;flex-direction:column;min-width:0;min-height:0;background:linear-gradient(180deg,rgba(12,20,29,.4),rgba(11,13,51,.25));position:relative;margin:10px 10px 10px 0;border-radius:18px;border:1px solid var(--line);box-shadow:0 20px 60px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.03);overflow:hidden}
.top{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 22px;border-bottom:1px solid var(--line);flex-shrink:0;background:rgba(11,13,51,.4);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:10}
.top h1{font-size:15px;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.top h1 .mk{width:8px;height:8px;border-radius:99px;background:linear-gradient(135deg,var(--cyan),var(--gold))}
.status{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--softer);margin-top:2px}
.status .dot{width:6px;height:6px;border-radius:99px;background:var(--faint);transition:background .3s}
.status.live .dot{background:var(--cyan);animation:breathe 1.5s var(--ease) infinite}
@keyframes breathe{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.samples{display:flex;gap:7px;overflow-x:auto;padding:11px 24px;border-bottom:1px solid var(--line);flex-shrink:0;scrollbar-width:none}
.samples::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 13px;border-radius:99px;border:1px solid var(--line);background:var(--cyan-faint);color:var(--soft);font-size:12px;transition:all .2s var(--ease);white-space:nowrap}
.chip:hover:not(:disabled){background:var(--cyan-dim);border-color:var(--cyan);color:var(--cyan);transform:translateY(-1px)}
.chip:active:not(:disabled){transform:scale(.96)}
.chip:disabled{opacity:.4;cursor:default}

/* THE scroll region — this and only this scrolls */
.stream{flex:1;overflow-y:auto;overflow-x:hidden;padding:24px;display:flex;flex-direction:column;gap:16px;min-height:0;scroll-behavior:smooth;transition:box-shadow .25s var(--ease);-webkit-mask-image:linear-gradient(180deg,transparent 0,#000 18px,#000 calc(100% - 14px),transparent 100%);mask-image:linear-gradient(180deg,transparent 0,#000 18px,#000 calc(100% - 14px),transparent 100%)}
.stream.dropping{box-shadow:inset 0 0 0 2px var(--cyan),inset 0 0 40px rgba(137,207,240,.1)}

.composer{display:flex;gap:9px;padding:14px 22px;border-top:1px solid var(--line);flex-shrink:0;background:rgba(11,13,51,.4);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);align-items:flex-end}
.composer .field{flex:1;display:flex;flex-direction:column;gap:7px}
/* round icon buttons flanking the input */
.cbtn{width:46px;height:46px;flex-shrink:0;border-radius:13px;border:1px solid var(--line-2);background:var(--cyan-faint);color:var(--soft);display:grid;place-items:center;transition:all .22s var(--ease)}
.cbtn svg{width:20px;height:20px;display:block}
.cbtn:hover{background:var(--cyan-dim);color:var(--cyan);border-color:var(--cyan);transform:translateY(-1px)}
.cbtn:active{transform:scale(.93)}
/* send is the primary action — filled cyan */
.cbtn.send{background:var(--cyan);color:var(--navy);border-color:var(--cyan)}
.cbtn.send:hover{background:var(--cyan);color:var(--navy);box-shadow:0 6px 18px rgba(137,207,240,.32);transform:translateY(-1px)}
.cbtn.send svg{transform:translateX(-1px)}
.cbtn.send:disabled{opacity:.45;cursor:default;transform:none;box-shadow:none}
/* mic ↔ stop icon swap */
.cbtn.voice .ic-stop{display:none}
.cbtn.voice.listening .ic-mic{display:none}
.cbtn.voice.listening .ic-stop{display:block}
/* voice button while listening: gold pulse = DaVinci hearing you */
.cbtn.voice.listening{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);animation:hearing 1.5s var(--ease) infinite}
@keyframes hearing{0%,100%{box-shadow:0 0 0 0 rgba(212,178,106,.45)}50%{box-shadow:0 0 0 7px rgba(212,178,106,0)}}
/* attached-file chips above the input */
.attached{display:flex;flex-wrap:wrap;gap:6px}
.attached:empty{display:none}
.att{display:flex;align-items:center;gap:7px;background:var(--cyan-dim);border:1px solid var(--line-2);border-radius:9px;padding:5px 8px;font-size:11.5px;color:var(--soft);max-width:180px;animation:rise .3s var(--ease-out)}
.att .ic{font-size:13px;color:var(--cyan)}
.att .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.att .x{cursor:pointer;color:var(--softer);font-weight:700;padding:0 2px;transition:color .15s}
.att .x:hover{color:var(--gold)}
.att img{width:22px;height:22px;border-radius:5px;object-fit:cover}
.composer input{flex:1;padding:13px 16px;border-radius:13px;border:1px solid var(--line-2);background:var(--cyan-faint);color:var(--light);font-size:14px;outline:none;transition:all .22s var(--ease)}
.composer input:focus{border-color:var(--cyan);background:var(--cyan-dim);box-shadow:0 0 0 4px var(--cyan-faint)}
.composer input::placeholder{color:var(--softer)}
.composer .send:active:not(:disabled){transform:scale(.96)}
.composer .send:disabled{opacity:.45;cursor:default}

.msg{display:flex;gap:11px;align-items:flex-start;animation:rise .45s var(--ease-out)}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.user{justify-content:flex-end}
.bubble.user{max-width:74%;background:var(--cyan);color:var(--navy);font-weight:500;padding:11px 15px;border-radius:16px 16px 5px 16px;box-shadow:0 2px 10px rgba(137,207,240,.18)}
.ubFiles{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.ubFiles img{width:54px;height:54px;border-radius:8px;object-fit:cover;border:1px solid rgba(7,17,31,.15)}
.ubFile{display:inline-flex;align-items:center;gap:5px;background:rgba(7,17,31,.12);border-radius:7px;padding:4px 8px;font-size:11.5px;font-weight:600}
.avatar{width:31px;height:31px;border-radius:10px;flex-shrink:0;margin-top:1px;background:linear-gradient(135deg,var(--cyan),var(--gold));color:var(--navy);display:grid;place-items:center;font-size:15px;font-weight:800;box-shadow:0 3px 12px rgba(137,207,240,.2);transition:box-shadow .3s var(--ease)}
/* gold "DaVinci is responding" glow */
.avatar.responding{animation:respond 1.6s var(--ease) infinite}
@keyframes respond{0%,100%{box-shadow:0 0 0 0 rgba(212,178,106,.5),0 3px 12px rgba(137,207,240,.2)}50%{box-shadow:0 0 0 7px rgba(212,178,106,0),0 3px 16px rgba(212,178,106,.4)}}
.aiwrap{flex:1;min-width:0;max-width:84%}
/* assistant bubble: warmer ivory gradient + teensy gold left accent + gold shimmer-in */
.bubble.ai{background:linear-gradient(180deg,#EFF9F9,var(--ivory));color:var(--ink);padding:13px 17px;line-height:1.6;position:relative;border-radius:5px 16px 16px 16px;border-left:2px solid var(--gold-dim);box-shadow:0 2px 16px rgba(7,17,31,.18);overflow:hidden}
.bubble.ai.fresh::after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(105deg,transparent 30%,rgba(212,178,106,.18) 50%,transparent 70%);transform:translateX(-100%);animation:goldsweep 1.1s var(--ease-out) forwards}
@keyframes goldsweep{to{transform:translateX(100%)}}
.bubble.ai .edgebar{position:absolute;left:-2px;top:11px;bottom:11px;width:2px;border-radius:2px;background:linear-gradient(180deg,var(--gold),transparent);opacity:.5}
.bubble.ai p{margin:0 0 3px}.bubble.ai p:last-child{margin-bottom:0}.bubble.ai strong{font-weight:700}
.step{display:flex;gap:9px;align-items:flex-start;padding:2px 0;font-size:13.5px}
.step .mk{font-weight:800;flex-shrink:0}.step .mk.done{color:var(--gold)}.step .mk.todo{color:#9aa4bd}
.step.done span:last-child{opacity:.55;text-decoration:line-through}
.phase{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:#8a6d2e;font-weight:700;margin:10px 0 3px}

.trace{margin-top:10px}
.trace .lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.13em;color:var(--softer);margin-bottom:7px;font-weight:600}
.flow{display:flex;flex-wrap:wrap;align-items:stretch;gap:6px}
.node{display:flex;flex-direction:column;gap:1px;padding:6px 11px;border-radius:10px;border:1px solid var(--line);background:var(--cyan-faint);font-size:12px;font-weight:600;animation:rise .4s var(--ease-out)}
.node .nm{display:flex;align-items:center;gap:5px}.node .why{font-size:10px;color:var(--softer);font-weight:400;max-width:170px}
.node.tech .g{color:var(--cyan)}.node.intel .g{color:var(--gold)}
.arrow{align-self:center;color:#3a4663;font-size:12px}

/* GENERATING animation — gold+cyan orbs + sweeping underline (palette only) */
.working{display:flex;align-items:center;gap:11px;padding:4px 2px 4px 42px;animation:rise .4s var(--ease-out)}
.orbs{display:flex;gap:6px}
.orb{width:8px;height:8px;border-radius:99px;animation:orb 1.3s var(--ease) infinite}
.orb:nth-child(1){background:var(--gold);animation-delay:0s}
.orb:nth-child(2){background:var(--cyan);animation-delay:.18s}
.orb:nth-child(3){background:var(--gold);animation-delay:.36s}
@keyframes orb{0%,100%{transform:scale(.6);opacity:.35}40%{transform:scale(1.15);opacity:1}}
.working .lbl{font-size:12.5px;color:var(--soft);font-style:italic;position:relative}
.working .lbl::after{content:"";position:absolute;left:0;right:0;bottom:-3px;height:1.5px;border-radius:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--cyan),transparent);background-size:200% 100%;animation:sweep 1.6s linear infinite}
@keyframes sweep{0%{background-position:200% 0}100%{background-position:-200% 0}}

.skl{position:relative;overflow:hidden;background:var(--faint);border-radius:7px}
.skl::after{content:"";position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,var(--cyan-dim),transparent);animation:shim 1.3s infinite}
@keyframes shim{100%{transform:translateX(100%)}}
.skl-bubble{background:linear-gradient(180deg,#EFF9F9,var(--ivory));border-radius:5px 16px 16px 16px;border-left:2px solid var(--gold-dim);padding:14px 17px;max-width:84%;display:flex;flex-direction:column;gap:8px;box-shadow:0 2px 16px rgba(7,17,31,.16)}
.skl-bubble .skl{background:rgba(7,17,31,.06)}
.skl-bubble .skl::after{background:linear-gradient(90deg,transparent,rgba(7,17,31,.05),transparent)}
.skl-line{height:11px}

.scene{margin-top:11px;background:rgba(7,17,31,.05);border-radius:11px;padding:12px}
.scene .sm{font-size:13px;font-weight:600;margin-bottom:9px}
.scene .o{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12.5px}
.scene .o b{font-weight:600}.scene .o .st{color:#5a6577;flex:1}.scene .o .cf{color:#8a93a5;font-size:11px;font-variant-numeric:tabular-nums}
.scene .an{display:flex;gap:7px;align-items:center;font-size:12.5px;color:#7a5a1e;margin-top:8px;font-weight:500;background:var(--gold-dim);padding:7px 10px;border-radius:9px}

.empty{text-align:center;padding:46px 14px;color:var(--softer)}
.empty .g{font-size:30px;margin-bottom:12px;opacity:.6}
.empty .t{font-size:14px;font-weight:700;color:var(--soft);margin-bottom:7px}
.empty .b{font-size:12.5px;line-height:1.6}

.pcard{background:var(--gold-faint);border:1px solid rgba(212,178,106,.2);border-radius:14px;padding:15px;transition:border-color .25s var(--ease),box-shadow .25s var(--ease)}
.pcard:hover{border-color:rgba(212,178,106,.34);box-shadow:0 6px 20px rgba(212,178,106,.08)}
.pcard+.pcard{margin-top:13px}
.pcard .ph{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;cursor:pointer;user-select:none}
.pcard .goal{font-size:14px;font-weight:700;line-height:1.3}
.pcard .tf{font-size:11px;color:var(--gold);background:var(--gold-dim);padding:3px 8px;border-radius:99px;white-space:nowrap;font-weight:600}
.pcard .chev{color:var(--gold);font-size:15px;transition:transform .3s var(--ease);transform:rotate(0deg);opacity:.7}
.pcard.collapsed .chev{transform:rotate(-90deg)}
/* smooth height collapse */
.psteps{overflow:hidden;max-height:600px;opacity:1;transition:max-height .4s var(--ease),opacity .3s var(--ease),margin .3s var(--ease)}
.pcard.collapsed .psteps{max-height:0;opacity:0;margin-top:-4px}
.pcard.collapsed .track{margin-top:10px}
.track{height:5px;background:var(--faint);border-radius:99px;margin-top:12px;overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--cyan));border-radius:99px;transition:width .6s var(--ease-out)}
.pcount{font-size:11px;color:var(--softer);margin-top:6px}
.pphase{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);font-weight:700;margin:12px 0 5px}
.pstep{display:flex;gap:9px;align-items:flex-start;font-size:12.5px;color:var(--soft);padding:5px 6px;line-height:1.4;border-radius:8px;transition:background .16s var(--ease);cursor:pointer;user-select:none}
.pstep:hover{background:rgba(212,178,106,.08)}
.pbox{width:16px;height:16px;border-radius:5px;border:1.6px solid var(--faint);flex-shrink:0;margin-top:1px;display:grid;place-items:center;font-size:10px;color:var(--navy);transition:all .2s var(--ease)}
.pstep.done .pbox{background:var(--gold);border-color:var(--gold)}
.pstep.done span{opacity:.5;text-decoration:line-through}

.mtitle{font-size:11px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:8px}
.mtitle.intel{color:var(--gold)}.mtitle.tech{color:var(--cyan)}
.mbucket+.mbucket{margin-top:16px}
.mitem{display:flex;gap:9px;align-items:flex-start;font-size:13px;color:var(--soft);padding:5px 0;line-height:1.45;animation:rise .35s var(--ease-out)}
.mitem .d{width:6px;height:6px;border-radius:99px;margin-top:6px;flex-shrink:0}
.mitem .d.intel{background:var(--gold)}.mitem .d.tech{background:var(--cyan)}
.mdash{color:var(--softer);font-size:13px}

.draft{background:linear-gradient(180deg,#EFF9F9,var(--ivory));color:var(--ink);border-radius:14px;padding:16px;box-shadow:0 2px 16px rgba(7,17,31,.14)}
.draft .k{font-size:11px;font-weight:700;color:#7a6a3a;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.draft .k .edit{font-size:10.5px;color:#5a7a9a;text-transform:none;letter-spacing:0;font-weight:600;background:rgba(137,207,240,.12);padding:2px 8px;border-radius:99px}
.dfield{display:flex;flex-direction:column;gap:4px;padding:7px 0;border-bottom:1px solid rgba(7,17,31,.07)}
.dfield .l{color:#6a7589;font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em}
.dfield input,.dfield textarea{background:rgba(7,17,31,.04);border:1px solid rgba(7,17,31,.1);border-radius:7px;padding:8px 10px;color:var(--ink);font-size:13px;outline:none;width:100%;transition:border-color .18s}
.dfield input:focus,.dfield textarea:focus{border-color:var(--cyan)}
.dfield textarea{resize:vertical;min-height:80px;line-height:1.5}
.confirm{width:100%;margin-top:15px;padding:11px;border-radius:11px;background:var(--cyan);color:var(--navy);font-weight:700;font-size:14px;transition:all .2s var(--ease)}
.confirm:hover{box-shadow:0 6px 18px rgba(137,207,240,.3);transform:translateY(-1px)}
.confirm:active{transform:scale(.97)}
.dhint{font-size:11px;color:var(--softer);text-align:center;margin-top:9px}

/* LIVE VISION VIEW */
.vision{display:flex;flex-direction:column;gap:13px}
.cam{position:relative;width:100%;aspect-ratio:4/3;background:#05060f;border-radius:14px;overflow:hidden;border:1px solid var(--line-2)}
.cam video{width:100%;height:100%;object-fit:cover;display:block}
.cam .off{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--softer);font-size:12.5px;text-align:center;padding:20px}
.cam .off .ic{font-size:30px;opacity:.5}
.cam .ring{position:absolute;inset:0;border-radius:14px;pointer-events:none}

<!-- Gemini Live client (mic <-> /live WebSocket). Defines window.LiveClient. -->
<script src="/live-client.js"></script>
<script>
/* ============================================================================
 *  DaVinci front end — vanilla, single file, no build step.
 *
 *  WIRED TO THE REAL BACKEND (live):
 *  ---------------------------------------------------------------------------
 *  - Chat turns stream from POST /api/chat/stream (SSE) — real router/agents/
 *    synth/memory events drive the trace flow. (runTurn)
 *  - Vision: POST /api/vision with the captured frame. (analyzeFrame)
 *  - Plan steps: POST /api/plans/step on toggle. (onStepToggled)
 *  - Boot hydrates plans + memory from /api/plans and /api/memory; /api/me
 *    checks the Google session.
 *  All requests send credentials:'include' so the login cookie carries through.
 *
 *  STILL LOCAL: camera/mic capture, TTS, all UI state/layout. The legacy mock
 *  text-brain has been removed — chat streams from /api/chat/stream.
 * ========================================================================== */

const AGENTS={
  router:{label:"Router",glyph:"⊹",kind:"tech"},
  researcher:{label:"Researcher",glyph:"✷",kind:"tech"},
  planner:{label:"Planner",glyph:"◷",kind:"intel"},
  executor:{label:"Executor",glyph:"➤",kind:"tech"},
  conversational:{label:"Conversation",glyph:"◍",kind:"tech"},
  vision:{label:"Vision",glyph:"◉",kind:"tech"},
  synthesizer:{label:"Synthesizer",glyph:"✦",kind:"intel"},
  memory:{label:"Memory",glyph:"❖",kind:"intel"},
};

/* persistent app state (survives across turns — panel never resets) */
const ctx={state:{plans:[],draft:null,claim:null},memory:{preferences:{},past_patterns:[],long_term_facts:[]}};
let busy=false, showTrace=true, wsView="work", panelTab="plans";
const collapsedPlans=new Set();   // plan ids the user has collapsed in the panel
/* Recall (Drive document search) state for the Docs tab. */
const docs={status:{docs:0,chunks:0},syncing:false,query:"",searching:false,hits:null};
/* Proactive attention feed (morning brief + Sentinel alerts). */
const notif={list:[],loading:false};
let attachments=[];               // files staged in the composer this turn
let composerRecog=null, composerListening=false;  // main-composer voice input

/* ============================ SMALL UTILS ============================== */
const wait=ms=>new Promise(r=>setTimeout(r,ms));
const uid=()=>Math.random().toString(36).slice(2,9);
const cap=s=>s?s[0].toUpperCase()+s.slice(1):s;

/* (Removed the legacy mock text-brain — chat now streams from /api/chat/stream.
   Small utils wait/uid/cap above are still used by live code.) */

/* -------------------- HOOK 1: THE LOOP (now LIVE via SSE) ----------------- */
/* Streams real orchestrator events from POST /api/chat/stream. Emits the SAME
   event shapes the UI already consumes ({type:'thinking'|'route'|'synth'|
   'memory'|'done', ...}) so nothing downstream changed. Scenes still go through
   the vision path (handled in send(), not here). credentials:'include' carries
   the Google session cookie. */
async function* runTurn(text,kind){
  // Scene turns are produced by analyzeFrame()/vision directly (which calls
  // /api/vision and renders into the chat itself). runTurn should never be
  // invoked with kind==="scene" anymore, but keep a safe no-op fallthrough that
  // uses the real last observation instead of a hardcoded mock.
  if(kind==="scene"){
    const s=vision.lastObs&&vision.lastObs.scene;
    const msg=s?(s.summary||"I looked at the scene."):"Start the camera feed and analyze a scene to have me look.";
    yield{type:"route",agent:"vision",reason:"scene → vision"};
    yield{type:"done",message:msg,soFar:s?[{from:"vision",message:msg,status:"ok",data:{isScene:true,scene:s}}]:[]};
    return;
  }

  const res=await fetch("/api/chat/stream",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    credentials:"include",
    body:JSON.stringify({message:text}),
  });
  if(res.status===401){
    yield{type:"done",message:"You're not signed in. Open **/api/auth/google** to log in, then try again.",soFar:[]};
    return;
  }
  if(!res.ok||!res.body){
    let msg="The server hit an error. Try again?";
    try{const j=await res.json();if(j&&j.error)msg=j.error}catch(e){}
    yield{type:"done",message:msg,soFar:[]};
    return;
  }

  const reader=res.body.getReader();
  const decoder=new TextDecoder();
  const soFar=[];           // accumulate agent responses for synth/scene detection
  let finalMessage="";
  let buf="";

  // Minimal SSE parser: split on blank lines, read `event:` + `data:`.
  const parseBlock=block=>{
    let ev="message",data="";
    for(const line of block.split("\n")){
      if(line.startsWith("event:"))ev=line.slice(6).trim();
      else if(line.startsWith("data:"))data+=line.slice(5).trim();
    }
    let parsed=null;try{parsed=data?JSON.parse(data):null}catch(e){}
    return{ev,parsed};
  };

  while(true){
    const{value,done}=await reader.read();
    if(done)break;
    buf+=decoder.decode(value,{stream:true});
    let nl;
    while((nl=buf.indexOf("\n\n"))>=0){
      const block=buf.slice(0,nl);buf=buf.slice(nl+2);
      if(!block.trim())continue;
      const{ev,parsed}=parseBlock(block);
      if(!parsed)continue;

      if(ev==="thinking"){
        yield{type:"thinking",agent:parsed.agent};
      }else if(ev==="route"){
        yield{type:"route",agent:parsed.agent,reason:parsed.reason||""};
      }else if(ev==="agent"){
        const r={from:parsed.agent,message:parsed.message,status:"ok"};
        soFar.push(r);
        yield{type:"agent",agent:parsed.agent,res:r};
      }else if(ev==="synth"){
        yield{type:"synth"};
      }else if(ev==="memory"){
        // Surface as a memory-learned node + refresh the memory panel later.
        yield{type:"memory",delta:{preferences:{},past_patterns:[],long_term_facts:[],_n:parsed.n}};
      }else if(ev==="done"){
        finalMessage=parsed.message||finalMessage;
      }else if(ev==="final"){
        finalMessage=parsed.reply||finalMessage;
        // Sync the real plans into UI state so the Workspace panel is accurate.
        if(Array.isArray(parsed.plans))ctx.state.plans=parsed.plans;
        // Open executor draft (email/event) for the Drafts panel, or clear it.
        ctx.state.draft=parsed.draft||null;
        if(parsed.offer)pendingOffer=parsed.offer;
        // Pull fresh memory in the background so the Memory tab reflects reality.
        refreshMemory();
      }else if(ev==="error"){
        finalMessage=parsed.error||"Something went wrong.";
      }
    }
  }

  yield{type:"done",message:finalMessage||"(no reply)",soFar};
}

let pendingOffer=null;   // {planId,prompt} from a physical-plan turn

/* Render the brain's "guide me with the camera" offer as a tappable AI line. */
function showCameraOffer(offer){
  const d=document.createElement("div");d.className="msg";
  d.innerHTML=`<div class="avatar">◐</div><div class="aiwrap"><div class="bubble ai fresh"><span class="edgebar"></span><p>${esc(offer.prompt)}</p><div class="vcontrols" style="margin-top:9px"><button class="vbtn intel" id="offerYes">▶ Guide me with the camera</button></div></div></div>`;
  stream.appendChild(d);scrollDown();
  const y=d.querySelector("#offerYes");
  if(y)y.onclick=()=>{
    // Start a guided coaching session bound to this plan, then jump to Vision.
    startGuidedSession(offer.planId);
    wsView="vision";
    $("wsSeg").querySelectorAll(".seg").forEach(x=>{const on=x.dataset.view==="vision";x.classList.toggle("on",on);x.classList.toggle("intel",on)});
    $("viewWork").style.display="none";$("viewVision").style.display="block";
    if(window.innerWidth<=900)app.classList.add("ws-open");
    renderVision();
  };
}

/* Begin a guided ("point-and-coach") session for a physical plan. From here,
   Analyze routes frames through /api/orchestrate so DaVinci coaches step by step
   and checks steps off as it sees them done. */
function startGuidedSession(planId){
  vision.session={mode:"guided",planId:planId||null};
  vision.sessionId="vs-"+uid();
  vision.watchFor=null;
  vision.summaries=[];
  const p=planId?ctx.state.plans.find(x=>x.id===planId):null;
  addAI(p?`Guiding you through **${p.goal}**. Start the camera feed and I'll walk you through it, checking steps off as we go.`:"Guided session ready. Start the camera feed and I'll coach you through it.",null,null);
}

/* End the active guided session: POST the accrued scene summaries and get one
   warm spoken-style recap back. Safe to call even outside a guided session. */
async function endGuidedSession(){
  const wasGuided=vision.session.mode==="guided";
  const planId=vision.session.planId;
  const summaries=vision.summaries.slice();
  vision.session={mode:"describe",planId:null};vision.watchFor=null;vision.summaries=[];
  if(!wasGuided)return;
  try{
    const r=await fetch("/api/vision/session/end",{
      method:"POST",headers:{"Content-Type":"application/json"},credentials:"include",
      body:JSON.stringify({planId,summaries}),
    });
    if(r.ok){
      const{recap}=await r.json();
      if(recap){addAI(recap,[{kind:"route",agent:"vision",reason:"session recap"}],null);speak(recap);}
    }
  }catch(e){console.warn("[session end] failed:",e.message);}
  // Refresh plans so any steps auto-checked during coaching are reflected.
  hydratePlans();
}

/* Pull the user's real long-term memory and repaint the Memory panel. */
async function refreshMemory(){
  try{
    const r=await fetch("/api/memory",{credentials:"include"});
    if(!r.ok)return;const m=await r.json();
    ctx.memory={
      preferences:m.preferences||{},
      past_patterns:m.past_patterns||[],
      long_term_facts:m.long_term_facts||[],
    };
    if(wsView==="work"&&panelTab==="memory")renderPanel();
  }catch(e){}
}

/* Pull the user's real plans and repaint the Plans panel. Used after guided
   coaching checks steps off server-side, and after a plan delete. */
async function hydratePlans(){
  try{
    const r=await fetch("/api/plans",{credentials:"include"});
    if(!r.ok)return;const j=await r.json();
    if(Array.isArray(j.plans))ctx.state.plans=j.plans;
    if(wsView==="work")renderPanel();
  }catch(e){}
}
/* (Removed visionAgentMock + SAMPLE_SCENE — vision is fully live now: the
   Vision workspace calls /api/vision, and guided coaching calls /api/orchestrate
   and /api/vision/session/end. No mock scene remains.) */

/* ============================ RENDER =================================== */
const $=id=>document.getElementById(id);
const stream=$("stream");
const esc=s=>(""+s).replace(/&/g,"&amp;").replace(/</g,"&lt;");
function fmt(text){return text.split("\n").map(ln=>{
  if(!ln.trim())return "<div style='height:7px'></div>";
  if(/^[✓○]/.test(ln)){const done=ln[0]==="✓";return `<div class="step ${done?'done':''}"><span class="mk ${done?'done':'todo'}">${done?'✓':'○'}</span><span>${esc(ln.slice(1).trim())}</span></div>`}
  if(/^(Setup|Build|Finish|Week|Phase|Day)/i.test(ln)&&ln.length<24)return `<div class="phase">${esc(ln)}</div>`;
  return `<p>${esc(ln).replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")}</p>`}).join("")}
function sceneHTML(s){return `<div class="scene"><div class="sm">${esc(s.summary)}</div>`+
  s.objects.map(o=>`<div class="o"><b>${esc(o.label)}</b><span class="st">${esc(o.state)}</span><span class="cf">${Math.round(o.confidence*100)}%</span></div>`).join("")+
  s.anomalies.map(a=>`<div class="an"><span style="color:var(--gold)">▲</span>${esc(a.description)}</div>`).join("")+`</div>`}
function traceHTML(trace){if(!trace.length)return "";
  const nodes=trace.map(t=>{
    if(t.kind==="route"){const a=AGENTS[t.agent];return `<div class="node ${a.kind}"><span class="nm"><span class="g">${a.glyph}</span>${a.label}</span><span class="why">${esc(t.reason)}</span></div>`}
    if(t.kind==="synth")return `<div class="node intel"><span class="nm"><span class="g">✦</span>fused</span></div>`;
    if(t.kind==="memory")return `<div class="node intel"><span class="nm"><span class="g">❖</span>+${t.n} learned</span></div>`;
    return ""}).filter(Boolean);
  return `<div class="trace"><div class="lbl">how this turn was reasoned</div><div class="flow">${nodes.join('<span class="arrow">→</span>')}</div></div>`}
function addUser(text,kind,files){const d=document.createElement("div");d.className="msg user";
  let filesHTML="";
  if(files&&files.length){filesHTML=`<div class="ubFiles">`+files.map(f=>{
    const isImg=f.type&&f.type.startsWith("image/");
    return isImg&&f.url?`<img src="${f.url}" alt=""/>`:`<span class="ubFile">${isImg?'🖼':'📄'} ${esc(f.name)}</span>`;
  }).join("")+`</div>`}
  d.innerHTML=`<div class="bubble user">${filesHTML}${text?(kind==="scene"?"<em>"+esc(text)+"</em>":esc(text)):""}</div>`;
  stream.appendChild(d);scrollDown()}
function addAI(message,trace,scene){const d=document.createElement("div");d.className="msg";
  d.dataset.trace=trace?JSON.stringify(trace):"";
  d.innerHTML=`<div class="avatar">◐</div><div class="aiwrap"><div class="bubble ai fresh"><span class="edgebar"></span>${fmt(message)}${scene?sceneHTML(scene):""}</div>${(showTrace&&trace)?traceHTML(trace):""}</div>`;
  stream.appendChild(d);scrollDown();
  const b=d.querySelector(".bubble.ai");setTimeout(()=>b&&b.classList.remove("fresh"),1200);}

let workEl=null;
function showWorking(label){if(workEl)workEl.remove();
  workEl=document.createElement("div");workEl.className="working";
  workEl.innerHTML=`<div class="orbs"><span class="orb"></span><span class="orb"></span><span class="orb"></span></div><span class="lbl" id="workLbl">${label||"thinking…"}</span>`;
  stream.appendChild(workEl);scrollDown()}
function setWorking(label){const l=$("workLbl");if(l)l.textContent=label}
function hideWorking(){if(workEl){workEl.remove();workEl=null}}

function bootSkeleton(){for(let i=0;i<2;i++){const d=document.createElement("div");d.className="msg";
  d.innerHTML=`<div class="avatar" style="opacity:.5">◐</div><div class="aiwrap"><div class="skl-bubble"><div class="skl skl-line" style="width:${78-i*16}%"></div><div class="skl skl-line" style="width:${64-i*10}%"></div></div></div>`;
  stream.appendChild(d)}}
function scrollDown(){requestAnimationFrame(()=>stream.scrollTo({top:stream.scrollHeight,behavior:"smooth"}))}
function setStatus(live,text){const s=$("status");s.classList.toggle("live",live);$("statusText").textContent=text}
function applyTraceVisibility(){document.querySelectorAll(".msg").forEach(m=>{
  const w=m.querySelector(".aiwrap");if(!w)return;const tr=m.dataset.trace;const ex=w.querySelector(".trace");
  if(showTrace){if(!ex&&tr){const x=document.createElement("div");x.innerHTML=traceHTML(JSON.parse(tr));if(x.firstChild)w.appendChild(x.firstChild)}}
  else if(ex)ex.remove()})}

/* working panel — persists; renders only on real change */
function renderTabs(){
  const plans=ctx.state.plans,draft=ctx.state.draft,mem=ctx.memory;
  const memN=Object.keys(mem.preferences).length+mem.past_patterns.length+mem.long_term_facts.length;
  const tabs=[["plans","Plans",plans.length],["memory","Memory",memN],["drafts","Drafts",draft?1:0],["docs","Docs",docs.status.docs||0]];
  $("wsTabs").innerHTML=tabs.map(([id,l,n])=>`<button class="wtab ${panelTab===id?'on':''}" data-tab="${id}">${l}${n?`<span class="badge">${n}</span>`:""}</button>`).join("");
  $("wsTabs").querySelectorAll(".wtab").forEach(b=>b.onclick=()=>{panelTab=b.dataset.tab;renderPanel()});
}
function renderPanel(){
  renderTabs();
  const plans=ctx.state.plans,draft=ctx.state.draft,mem=ctx.memory;
  const memN=Object.keys(mem.preferences).length+mem.past_patterns.length+mem.long_term_facts.length;
  const body=$("wsBody");
  if(panelTab==="plans")body.innerHTML=plans.length?plans.map(planCard).join(""):empty("◷","No plans yet","Say “plan a 2-week trip” and your goal shows up here, tracked step by step.");
  else if(panelTab==="memory")body.innerHTML=memN?memHTML(mem):empty("❖","Nothing remembered yet","Tell DaVinci something durable — “I'm vegetarian”, “I run every morning” — and it sticks here.");
  else if(panelTab==="drafts")body.innerHTML=draft?draftHTML(draft):empty("➤","No draft waiting","Ask DaVinci to send an email or set a reminder. The draft lands here to confirm before anything happens.");
  else body.innerHTML=docsHTML();
  wirePanel();
}
function empty(g,t,b){return `<div class="empty"><div class="g">${g}</div><div class="t">${t}</div><div class="b">${b}</div></div>`}
function planCard(p){const idx=ctx.state.plans.indexOf(p);
  const done=p.steps.filter(s=>s.done).length;const g={};p.steps.forEach((s,i)=>{(g[s.phase]=g[s.phase]||[]).push({s,i})});
  const collapsed=collapsedPlans.has(p.id);
  return `<div class="pcard ${collapsed?'collapsed':''}"><div class="ph" data-collapse="${idx}"><div class="goal">${esc(p.goal)}</div><div style="display:flex;align-items:center;gap:7px"><span class="tf">${esc(p.timeframe)}</span><span class="pdel" data-del="${esc(p.id)}" title="Delete plan" style="cursor:pointer;color:var(--softer);font-size:15px;line-height:1">✕</span><span class="chev">⌄</span></div></div>
    <div class="track"><div class="fill" style="width:${done/p.steps.length*100}%"></div></div>
    <div class="pcount">${done} of ${p.steps.length} done</div>
    <div class="psteps">`+
    Object.entries(g).map(([ph,arr])=>`<div class="pphase">${esc(ph)}</div>`+arr.map(({s,i})=>
      `<div class="pstep ${s.done?'done':''}" data-plan="${idx}" data-step="${i}"><span class="pbox">${s.done?'✓':''}</span><span>${esc(s.text)}</span></div>`).join("")).join("")+`</div></div>`}
function memHTML(m){const prefs=Object.entries(m.preferences).map(([k,v])=>k+": "+v);
  const bucket=(title,kind,items)=>`<div class="mbucket"><div class="mtitle ${kind}">${title}</div>`+
    (items.length?items.map(it=>`<div class="mitem"><span class="d ${kind}"></span>${esc(it)}</div>`).join(""):`<div class="mdash">—</div>`)+`</div>`;
  return bucket("Preferences","intel",prefs)+bucket("Patterns","tech",m.past_patterns)+bucket("Lasting facts","intel",m.long_term_facts)}
function draftHTML(d){
  const fld=(l,id,v,ta)=>`<div class="dfield"><span class="l">${l}</span>${ta?`<textarea data-f="${id}">${esc(v)}</textarea>`:`<input data-f="${id}" value="${esc(v).replace(/"/g,'&quot;')}"/>`}</div>`;
  const inner=d.kind==="email"?fld("To","to",d.to)+fld("Subject","subject",d.subject)+fld("Body","body",d.body,true):fld("Title","title",d.title)+fld("When","when",d.when)+fld("Duration","duration",d.duration);
  return `<div class="draft"><div class="k"><span>${d.kind==="email"?"✉ Email draft":"◷ Calendar event"}</span><span class="edit">live · editable</span></div>${inner}
    <button class="confirm" id="confirmBtn">${d.kind==="email"?"Send it":"Add it"}</button>
    <div class="dhint">Nothing leaves DaVinci until you confirm.</div></div>`}
/* Docs (Recall) panel: index Drive, then semantic-search your own documents. */
function docsHTML(){
  const st=docs.status;
  const head=`<div class="draft"><div class="k"><span>❖ Your documents</span><span class="edit">${st.docs?st.docs+" docs · "+st.chunks+" chunks":"not indexed"}</span></div>
    <div class="dhint" style="margin:0 0 10px">DaVinci reads your Google Drive on-device and answers from it. Sync to index new or changed files.</div>
    <button class="confirm" id="docsSync" ${docs.syncing?"disabled":""}>${docs.syncing?"◷ Indexing…":"⟳ Sync Drive"}</button>
    <div class="dfield" style="margin-top:12px"><span class="l">Search your docs</span><input id="docsQ" placeholder="e.g. the contract with the March date" value="${esc(docs.query).replace(/"/g,'&quot;')}"/></div>
    <button class="confirm" id="docsSearch" ${docs.searching?"disabled":""}>${docs.searching?"◷ Searching…":"Search"}</button></div>`;
  let results="";
  if(docs.hits!=null){
    results=docs.hits.length
      ?`<div style="margin-top:12px">`+docs.hits.map(h=>`<div class="obs" style="margin-top:8px"><div class="oh">❖ ${esc(h.docName||"Document")} · ${Math.round((h.score||0)*100)}%</div><div class="summary">${esc((h.text||"").slice(0,280))}${(h.text||"").length>280?"…":""}</div></div>`).join("")+`</div>`
      :`<div class="empty" style="padding:24px 14px"><div class="g">❖</div><div class="t">No matches</div><div class="b">Try different words, or sync your Drive first.</div></div>`;
  }
  return head+results;
}
async function recallSync(){
  docs.syncing=true;renderPanel();

    const j=await r.json().catch(()=>({}));
    if(j&&j.error)addAI("Couldn't sync Drive — "+j.error,null,null);

  }catch(e){addAI("Drive sync failed — "+(e.message||"network error")+".",null,null);}

}
async function recallStatus(){
  try{const r=await fetch("/api/recall/status",{credentials:"include"});if(r.ok)docs.status=await r.json();}catch(e){}
}
async function recallSearch(q){
  docs.query=q;docs.searching=true;docs.hits=null;renderPanel();

    const r=await fetch("/api/recall/search?q="+encodeURIComponent(q),{credentials:"include"});

function wirePanel(){
  $("wsBody").querySelectorAll("[data-collapse]").forEach(el=>el.onclick=()=>{
    const p=ctx.state.plans[+el.dataset.collapse];if(!p)return;
    if(collapsedPlans.has(p.id))collapsedPlans.delete(p.id);else collapsedPlans.add(p.id);renderPanel();
  });
  $("wsBody").querySelectorAll("[data-del]").forEach(el=>el.onclick=async ev=>{
    ev.stopPropagation();
    const id=el.dataset.del;
    if(!confirm("Delete this plan? This can't be undone."))return;
    // Optimistic removal, reconciled against the server.
    const prev=ctx.state.plans.slice();
    ctx.state.plans=ctx.state.plans.filter(p=>p.id!==id);renderPanel();
    try{
      const r=await fetch("/api/plans/"+encodeURIComponent(id),{method:"DELETE",credentials:"include"});
      if(!r.ok)throw new Error("delete "+r.status);
    }catch(e){ctx.state.plans=prev;renderPanel();console.warn("[plan delete] failed:",e.message);}
  });
  $("wsBody").querySelectorAll(".pstep").forEach(el=>el.onclick=ev=>{
    ev.stopPropagation();
    const pi=+el.dataset.plan,si=+el.dataset.step;const step=ctx.state.plans[pi].steps[si];
    step.done=!step.done;onStepToggled(ctx.state.plans[pi],si,step.done);renderPanel();
  });
  $("wsBody").querySelectorAll("[data-f]").forEach(el=>el.oninput=()=>{if(ctx.state.draft)ctx.state.draft[el.dataset.f]=el.value});
  const c=$("confirmBtn");if(c)c.onclick=()=>{const d=ctx.state.draft;send(d&&d.kind==="email"?"send it":"add it","text")};
  const ds=$("docsSync");if(ds)ds.onclick=recallSync;
  const dq=$("docsQ");if(dq)dq.oninput=()=>{docs.query=dq.value};
  const dse=$("docsSearch");if(dse)dse.onclick=()=>{const q=(docs.query||"").trim();if(q)recallSearch(q)};
  if(dq)dq.onkeydown=e=>{if(e.key==="Enter"){const q=(docs.query||"").trim();if(q)recallSearch(q)}};
}
/* HOOK 3 (LIVE): user manually ticked a step → tell the backend so the plan
   record stays consistent. The server returns the updated plan; we swap it into
   state and repaint. Optimistic UI already flipped the box; we reconcile here. */
async function onStepToggled(plan,stepIndex,done){
  try{
    const r=await fetch("/api/plans/step",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      credentials:"include",
      body:JSON.stringify({planId:plan.id,stepIndex,done}),
    });
    if(!r.ok)throw new Error("step "+r.status);
    const{plan:updated}=await r.json();
    if(updated){const i=ctx.state.plans.findIndex(p=>p.id===updated.id);if(i>=0){ctx.state.plans[i]=updated;renderPanel();}}
  }catch(e){
    // Revert the optimistic flip on failure.
    const step=plan.steps[stepIndex];if(step)step.done=!done;renderPanel();
    console.warn("[step sync] failed:",e.message);
  }
}

/* ============================ VISION VIEW (real shell) ================== */
const vision={stream:null,recog:null,listening:false,analyzing:false,audioCtx:null,analyser:null,raf:null,micStream:null,lastObs:null,transcript:"",sessionId:null,
  // Guided ("point-and-coach") session state. When session.mode==="guided" the
  // Analyze action routes through /api/orchestrate (which returns a coaching
  // directive and checks steps off), and ending the session calls
  // /api/vision/session/end for a spoken recap.
  session:{mode:"describe",planId:null},watchFor:null,summaries:[],
  // Voice-driven action: lastPhrase is the most recent completed utterance
  // (used as the query for a voice-triggered look); spokenActedLen tracks how
  // much of the final transcript has already been acted on.
  lastPhrase:null,spokenActedLen:0};
function renderVision(){

function obsHTML(o){const s=o.scene;
  return `<div class="obs"><div class="oh">❖ Perception · v${o.schema_version}</div>
    <div class="summary">${esc(s.summary)}</div>
    ${s.objects.map(ob=>`<div class="row"><b>${esc(ob.label)}</b><span class="st">${esc(ob.state)}</span><span class="cf">${Math.round(ob.confidence*100)}%</span></div>`).join("")}

function wireVision(){
  const cam=$("vCam");if(cam)cam.onclick=toggleCam;
  const an=$("vAnalyze");if(an&&vision.stream&&!vision.analyzing)an.onclick=analyzeFrame;
  const mic=$("vMic");if(mic)mic.onclick=toggleMic;

  const end=$("vEnd");if(end)end.onclick=async()=>{await endGuidedSession();renderVision();};

async function toggleCam(){
  if(vision.stream){vision.stream.getTracks().forEach(t=>t.stop());vision.stream=null;renderVision();return}
  try{vision.stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"},width:{ideal:1280},height:{ideal:720}},audio:false});renderVision();
    // Ensure the visible <video> actually has the stream and is playing.
    const v=$("camVideo");if(v){v.srcObject=vision.stream;try{await v.play()}catch(_){}}}
  catch(e){alert("Camera unavailable: "+e.message+"\n(Needs HTTPS or localhost + permission.)")}

/* HOOK 2 (LIVE): POST the captured frame (+ transcript) to /api/vision.
   The backend returns a VisionObservation envelope (schema 1.0) which obsHTML
   already knows how to render. Vision runs on the configured brain (Sonnet 4.6
   by default). */
async function analyzeFrame(){
  if(!vision.stream||vision.analyzing)return;
  vision.analyzing=true;renderVision();
  const vid=$("camVideo");
  // Guarantee the video is attached and has a painted frame before capture,
  // otherwise the canvas grabs an all-black frame.
  if(vid&&!vid.srcObject){vid.srcObject=vision.stream;try{await vid.play()}catch(_){}}
  const ready=async()=>{for(let i=0;i<30;i++){if(vid&&vid.videoWidth>0&&vid.readyState>=2)return true;await new Promise(r=>setTimeout(r,50));}return false;};
  if(!(await ready())){
    vision.analyzing=false;renderVision();
    addAI("Camera isn't producing a frame yet — give it a second after starting the feed, then try Analyze again.",null,null);
    return;
  }
  const canvas=document.createElement("canvas");canvas.width=vid.videoWidth;canvas.height=vid.videoHeight;
  canvas.getContext("2d").drawImage(vid,0,0,canvas.width,canvas.height);
  const frameDataUrl=canvas.toDataURL("image/jpeg",0.7);
  // Prefer the most recent spoken phrase (voice-triggered look) so DaVinci
  // answers the actual question; fall back to the full transcript for a manual
  // Analyze press. Clear lastPhrase after reading it so a later manual press
  // doesn't reuse a stale question.
  const query=(vision.lastPhrase||vision.transcript||"").trim();
  vision.lastPhrase=null;

  let observation=null;
  try{
    const res=await fetch("/api/vision",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      credentials:"include",
      body:JSON.stringify({
        image:frameDataUrl,
        tier:"deep",
        task_context:{task:query?"answer about scene":"observe",mode:"live"},
        user_transcript:query,
        recent:vision.lastObs?[vision.lastObs.scene.summary]:[],
        media_meta:{source_type:"camera",resolution:"live",capture_device:"browser"},
      }),
    });
    if(res.status===401){
      vision.analyzing=false;renderVision();
      addAI("You're not signed in. Open **/api/auth/google** to log in, then start the feed again.",null,null);
      return;
    }
    if(!res.ok){throw new Error("vision "+res.status)}
    observation=await res.json();
  }catch(e){
    vision.analyzing=false;renderVision();
    addAI("Couldn't analyze that frame — "+(e.message||"network error")+". Try again?",null,null);
    return;
  }

  vision.lastObs=observation;
  const s=observation.scene||{};
  if(s.summary)vision.summaries.push(s.summary);

  // Guided session: hand the observation to the orchestrator for a coaching
  // directive (and server-side step check-off).
  if(vision.session.mode==="guided"){
    await runGuidedTurn(observation);
    vision.analyzing=false;renderVision();
    return;
  }

  // Describe mode. If the user actually ASKED something, run the reasoning stage
  // (/api/orchestrate) so DaVinci ANSWERS the question — not just narrates the
  // objects it sees. Perception (/api/vision) describes; the vision agent
  // decides. Only when there's no question do we fall back to a plain scene
  // read-out.
  if(query){
    await runDescribeTurn(observation,query);
    vision.analyzing=false;renderVision();
    return;
  }

  vision.analyzing=false;renderVision();
  const warn=(s.anomalies&&s.anomalies[0])||null;
  const summary=(s.summary||"").toLowerCase();
  const line=warn
    ?`Looking now — ${summary} One thing stands out: ${warn.description.toLowerCase()}`
    :`Looking now — ${summary} Nothing unusual.`;
  addAI(line,[{kind:"route",agent:"vision",reason:"live frame analyzed"}],s);
  speak(line);
}

/* Describe-mode reasoning turn: the user asked a question about what DaVinci can
   see. POST the observation to /api/orchestrate with NO guided plan, so the
   vision agent answers the question conversationally (one short spoken line).
   This is the difference between "man 99%, hair 97%, ..." and an actual answer. */
async function runDescribeTurn(observation,query){
  let d=null;
  try{
    const r=await fetch("/api/orchestrate",{
      method:"POST",headers:{"Content-Type":"application/json"},credentials:"include",
      body:JSON.stringify({observation,session:{mode:"describe",planId:null}}),
    });
    if(!r.ok)throw new Error("orchestrate "+r.status);
    d=await r.json();
  }catch(e){
    // Fall back to a plain scene summary so the user still gets something.
    const s=observation.scene||{};
    const line=`Looking now — ${(s.summary||"").toLowerCase()}`;
    addAI(line,[{kind:"route",agent:"vision",reason:"live frame analyzed"}],s);
    speak(line);
    return;
  }
  vision.watchFor=d.watch_for||null;
  // The agent answers in `guidance`. If it chose to stay silent (e.g. a pure
  // "watch for X" acknowledgement with nothing to say), give a minimal fallback.
  const answer=(d.guidance||"").trim()
    || (d.watch_for?`Got it — I'll watch for ${d.watch_for} and let you know.`:"I had a look, but I'm not sure what you'd like to know — ask me about anything in view.");
  // Answer only — the structured perception stays in the Vision panel, not
  // dumped as an object list under the reply.
  addAI(answer,[{kind:"route",agent:"vision",reason:"answered from live view"}],null);
  speak(answer);
}

/* Guided coaching turn: POST the v1.0 observation to /api/orchestrate with the
   active session. The server returns { guidance, watch_for, done, done_message,
   step_checked } — it performs the step check-off itself; we reflect it here. */
async function runGuidedTurn(observation){
  let d=null;
  try{
    const r=await fetch("/api/orchestrate",{
      method:"POST",headers:{"Content-Type":"application/json"},credentials:"include",
      body:JSON.stringify({observation,session:{mode:"guided",planId:vision.session.planId}}),
    });
    if(!r.ok)throw new Error("orchestrate "+r.status);
    d=await r.json();
  }catch(e){
    addAI("Lost the thread for a second — "+(e.message||"network error")+". Point the camera again and I'll pick back up.",null,null);
    return;
  }
  vision.watchFor=d.watch_for||null;
  // The server already checked the step off; pull the fresh plan so the panel
  // and progress bar update, and acknowledge it inline.
  if(typeof d.step_checked==="number"){
    await hydratePlans();
    const p=ctx.state.plans.find(x=>x.id===vision.session.planId);
    const stepText=p&&p.steps[d.step_checked]?p.steps[d.step_checked].text:null;
    if(stepText)addTraceLine(`✓ Checked off: ${stepText}`);
  }
  const guidance=d.guidance||"Keep going — I'm watching.";
  addAI(guidance,[{kind:"route",agent:"vision",reason:"guided step"}],null);
  speak(guidance);
  if(d.done){
    const msg=d.done_message||"That's everything — nice work.";
    addAI(msg,null,null);speak(msg);
    await endGuidedSession();
  }
}

/* Tiny inline trace note (used for step check-offs during coaching). */
function addTraceLine(text){
  const d=document.createElement("div");d.className="msg";
  d.innerHTML=`<div class="avatar">✓</div><div class="aiwrap"><div class="bubble ai" style="opacity:.85"><span class="edgebar"></span><p style="font-size:13px">${esc(text)}</p></div></div>`;
  stream.appendChild(d);scrollDown();
}
/* (Removed buildObservationEnvelope — the server now owns the v1.0 envelope and
   returns it from /api/vision. The guided directive comes from /api/orchestrate,
   handled in runGuidedTurn below.) */
function toggleMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert("Speech recognition isn't supported here. Try Chrome.");return}
  if(vision.listening){vision.recog&&vision.recog.stop();return}
  vision.recog=new SR();vision.recog.continuous=true;vision.recog.interimResults=true;vision.recog.lang="en-US";
  // Track how much of the transcript we've already acted on, so each new spoken
  // phrase triggers exactly one look — not the whole accumulated transcript.
  vision.spokenActedLen=0;
  vision.recog.onresult=e=>{
    let txt="",finalTxt="",sawFinal=false;
    for(let i=0;i<e.results.length;i++){
      txt+=e.results[i][0].transcript;
      if(e.results[i].isFinal){finalTxt+=e.results[i][0].transcript;sawFinal=true;}
    }
    vision.transcript=txt;renderVision();
    // A completed utterance (natural pause) is the user's cue to ACT. Fire once
    // per new final phrase, debounced so a burst of finals doesn't stack calls.
    if(sawFinal){
      const phrase=finalTxt.slice(vision.spokenActedLen).trim();
      vision.spokenActedLen=finalTxt.length;
      if(phrase){vision.lastPhrase=phrase;onSpokenPhrase(phrase);}
    }
  };
  vision.recog.onend=()=>{vision.listening=false;stopMeter();renderVision()};
  vision.recog.onerror=()=>{vision.listening=false;stopMeter();renderVision()};
  vision.recog.start();vision.listening=true;renderVision();startMeter();
}
/* The user said something to DaVinci in the Vision panel. Act on it: if the
   camera is live, look at the current frame and answer (guided coaching turn if
   a session is active, otherwise a one-shot describe/answer). If the camera is
   off, say so out loud instead of silently swallowing the speech. */
let spokenDebounce=null;
function onSpokenPhrase(phrase){
  if(spokenDebounce)clearTimeout(spokenDebounce);
  spokenDebounce=setTimeout(async()=>{
    if(vision.analyzing)return;               // a look is already in flight
    if(!vision.stream){
      const msg="I'm listening, but the camera's off — tap Start feed and I'll look while you talk.";
      addAI(msg,null,null);speak(msg);
      return;
    }
    // The transcript already holds the phrase; analyzeFrame() reads it and sends
    // it as user_transcript, so DaVinci answers the actual question about what
    // it sees.
    await analyzeFrame();
  },700);
}
async function startMeter(){
  try{const s=await navigator.mediaDevices.getUserMedia({audio:true});
    vision.audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    const src=vision.audioCtx.createMediaStreamSource(s);vision.analyser=vision.audioCtx.createAnalyser();vision.analyser.fftSize=64;src.connect(vision.analyser);
    vision.micStream=s;const data=new Uint8Array(vision.analyser.frequencyBinCount);
    const loop=()=>{if(!vision.analyser)return;vision.analyser.getByteFrequencyData(data);
      document.querySelectorAll("#bars .bar").forEach((bar,i)=>{const v=data[i%data.length]/255;bar.style.height=Math.max(14,v*100)+"%"});
      vision.raf=requestAnimationFrame(loop)};loop();
  }catch(e){}
}
function stopMeter(){if(vision.raf)cancelAnimationFrame(vision.raf);vision.raf=null;if(vision.micStream)vision.micStream.getTracks().forEach(t=>t.stop());if(vision.audioCtx)vision.audioCtx.close().catch(()=>{});vision.audioCtx=null;vision.analyser=null;document.querySelectorAll("#bars .bar").forEach(b=>b.style.height="14%")}
function speak(text){if(!window.speechSynthesis)return;const u=new SpeechSynthesisUtterance(text);u.rate=1.02;speechSynthesis.cancel();speechSynthesis.speak(u)}
function speakLast(){const last=[...stream.querySelectorAll(".bubble.ai")].pop();if(last)speak(last.textContent)}

/* ============================ COMPOSER: ATTACH + VOICE ================== */
function renderAttachments(){
  const wrap=$("attached");if(!wrap)return;
  wrap.innerHTML=attachments.map((a,i)=>{
    const isImg=a.type&&a.type.startsWith("image/");
    const thumb=isImg&&a.url?`<img src="${a.url}" alt=""/>`:`<span class="ic">${isImg?'🖼':'📄'}</span>`;
    return `<span class="att">${thumb}<span class="nm">${esc(a.name)}</span><span class="x" data-i="${i}">×</span></span>`;
  }).join("");
  wrap.querySelectorAll(".x").forEach(x=>x.onclick=()=>{const i=+x.dataset.i;if(attachments[i].url)URL.revokeObjectURL(attachments[i].url);attachments.splice(i,1);renderAttachments()});
}
/* Read a File into a base64 data URL (for POSTing uploaded images to /api/vision). */
function fileToDataUrl(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>resolve(r.result);
    r.onerror=()=>reject(new Error("couldn't read file"));
    r.readAsDataURL(file);
  });
}
function addFiles(fileList){
  for(const f of fileList){
    const a={name:f.name,type:f.type,size:f.size,file:f};
    if(f.type&&f.type.startsWith("image/"))a.url=URL.createObjectURL(f);
    attachments.push(a);
  }
  renderAttachments();
}
/* Attachments are staged here, then handled on send: images are POSTed to
   /api/vision (analyzed and answered), and non-image files are acknowledged
   honestly (document reading isn't wired yet). See send(). */

/* main-composer voice input — REAL spoken conversation over Gemini Live.
   Streams mic audio to our /live WebSocket, plays DaVinci's voice back, and
   drops both sides' transcripts into the chat. Works in any browser (no Web
   Speech dependency). Press to start talking, press again to end. */
let liveOn=false, liveUserEl=null, liveAiEl=null;

function liveBubble(who){ // minimal live-updating bubble appended to the chat
  const d=document.createElement("div");
  d.className = who==="user" ? "msg user" : "msg";
  const b=document.createElement("div");
  b.className = who==="user" ? "bubble" : "bubble ai";
  b.textContent="…";
  if(who==="user"){d.appendChild(b);} else {
    const av=document.createElement("div");av.className="avatar";av.textContent="◐";
    d.appendChild(av);d.appendChild(b);
  }
  stream.appendChild(d);scrollDown();
  return b;
}

function toggleComposerVoice(){
  if(!window.LiveClient){alert("Voice module didn't load. Hard-refresh the page (Ctrl+Shift+R).");return}

  // Second press -> end the session.
  if(liveOn){
    LiveClient.stop();
    liveOn=false;liveUserEl=null;liveAiEl=null;
    $("btnVoice").classList.remove("listening");
    setStatus(false,"Ready");
    return;
  }

  // First press -> open a live session.
  LiveClient.init({
    callbacks:{
      onState:(s)=>{
        const btn=$("btnVoice");
        btn.classList.toggle("listening", s==="listening"||s==="live"||s==="connecting");
        const label={connecting:"Connecting…",live:"Listening…",listening:"Listening…",speaking:"DaVinci speaking…",idle:"Ready",error:"Voice error"}[s]||"";
        setStatus(s!=="idle"&&s!=="error", label);
      },
      onUserTranscript:(text,final)=>{
        if(!liveUserEl) liveUserEl=liveBubble("user");
        liveUserEl.textContent=text;scrollDown();
        if(final) liveUserEl=null;
      },
      onModelTranscript:(text,final)=>{
        if(!liveAiEl) liveAiEl=liveBubble("ai");
        liveAiEl.textContent=text;scrollDown();
        if(final) liveAiEl=null;
      },
      onError:(msg)=>{
        liveOn=false;$("btnVoice").classList.remove("listening");
        setStatus(false,"Ready");
        addAI("Voice session error — "+(msg||"unknown")+". Try again?",null,null);
      },
    },
  });

  liveOn=true;
  $("btnVoice").classList.add("listening");
  setStatus(true,"Connecting…");
  LiveClient.start().catch(err=>{
    liveOn=false;$("btnVoice").classList.remove("listening");setStatus(false,"Ready");
    addAI("Couldn't start voice — "+((err&&err.message)||err||"mic/permission error")+".",null,null);
  });
}

/* ============================ DRIVE A TURN ============================= */
async function send(text,kind){
  text=(text||"").trim();
  const hasFiles=attachments.length>0;
  if(busy||(!text&&!hasFiles))return;
  // an image attachment with no specific text reads as a scene for the vision agent
  if(!kind){const onlyImages=hasFiles&&attachments.every(a=>a.type&&a.type.startsWith("image/"));kind=onlyImages&&!text?"scene":"text"}
  busy=true;$("send").disabled=true;$("input").value="";
  document.querySelectorAll(".chip").forEach(c=>c.disabled=true);
  const sentFiles=attachments.slice();attachments=[];renderAttachments();
  setStatus(true,"Routing…");addUser(text||(sentFiles.length?"(shared "+sentFiles.length+" file"+(sentFiles.length>1?"s":"")+")":""),kind,sentFiles);
  const trace=[];showWorking("routing…");
  let finalMsg="",scene=null;

  // Image attachments are real input: route them through the vision pipeline
  // (the only endpoint that accepts an image) rather than dropping them. The
  // typed text rides along as the question about the picture.
  const imgFile=sentFiles.find(a=>a.type&&a.type.startsWith("image/")&&a.file);
  if(imgFile){
    try{
      const dataUrl=await fileToDataUrl(imgFile.file);
      const res=await fetch("/api/vision",{
        method:"POST",headers:{"Content-Type":"application/json"},credentials:"include",
        body:JSON.stringify({
          image:dataUrl,tier:"deep",
          task_context:{task:text?"answer about image":"observe",mode:"upload"},
          user_transcript:text||"",
          media_meta:{source_type:"upload",resolution:"still",capture_device:"file"},
        }),
      });
      if(res.status===401){hideWorking();addAI("You're not signed in. Open **/api/auth/google** to log in, then try again.",null,null);}
      else if(!res.ok){hideWorking();addAI("Couldn't read that image — the server returned "+res.status+". Try again?",null,null);}
      else{
        const obs=await res.json();const s=obs.scene||{};
        vision.lastObs=obs;
        if(text){
          // The user asked something about the image — reason and answer.
          let answered=false;
          try{
            const orc=await fetch("/api/orchestrate",{
              method:"POST",headers:{"Content-Type":"application/json"},credentials:"include",
              body:JSON.stringify({observation:obs,session:{mode:"describe",planId:null}}),
            });
            if(orc.ok){
              const d=await orc.json();
              const answer=(d.guidance||"").trim();
              if(answer){hideWorking();addAI(answer,[{kind:"route",agent:"vision",reason:"answered from image"}],null);speak(answer);answered=true;}
            }
          }catch(e){}
          if(!answered){
            hideWorking();
            const line=`Looking at what you shared — ${(s.summary||"").toLowerCase()}`;
            addAI(line,[{kind:"route",agent:"vision",reason:"uploaded image analyzed"}],s);
          }
        }else{
          // No question — a plain scene read-out.
          hideWorking();
          const warn=(s.anomalies&&s.anomalies[0])||null;
          const line=`Here's what I see — ${(s.summary||"").toLowerCase()}${warn?" Worth noting: "+warn.description.toLowerCase():""}`;
          addAI(line,[{kind:"route",agent:"vision",reason:"uploaded image analyzed"}],s);
        }
      }
    }catch(e){hideWorking();addAI("Couldn't process that image — "+(e.message||"read error")+".",null,null);}
    // Any non-image files that came along can't be handled yet — say so plainly
    // instead of pretending they were used.
    const others=sentFiles.filter(a=>!(a.type&&a.type.startsWith("image/")));
    if(others.length)addAI("I can see images right now, but I can't read "+others.map(a=>a.name).join(", ")+" yet — document understanding is coming. Paste the key text and I'll work with it.",null,null);
    busy=false;$("send").disabled=false;document.querySelectorAll(".chip").forEach(c=>c.disabled=false);setStatus(false,"Ready");$("input").focus();
    return;
  }
  // Non-image files with no image present: be honest rather than silently drop.
  if(sentFiles.length&&!imgFile){
    hideWorking();
    addAI("I've noted "+sentFiles.map(a=>a.name).join(", ")+", but I can't read documents yet — that's on the way. For now, paste the important text and I'll help with it directly.",null,null);
    if(text){/* fall through to normal text turn below with the typed message */}
    else{busy=false;$("send").disabled=false;document.querySelectorAll(".chip").forEach(c=>c.disabled=false);setStatus(false,"Ready");$("input").focus();return;}
    showWorking("routing…");
  }

  try{
    for await(const ev of runTurn(text||"(file shared)",kind)){
      if(ev.type==="thinking"){setStatus(true,cap(AGENTS[ev.agent].label)+"…");setWorking(AGENTS[ev.agent].label.toLowerCase()+"…")}
      if(ev.type==="route"){trace.push({kind:"route",agent:ev.agent,reason:ev.reason});setStatus(true,cap(AGENTS[ev.agent].label)+"…");setWorking(AGENTS[ev.agent].label.toLowerCase()+" is working…")}
      if(ev.type==="synth"){trace.push({kind:"synth"})}
      if(ev.type==="memory"){const n=ev.delta._n!=null?ev.delta._n:(Object.keys(ev.delta.preferences).length+ev.delta.past_patterns.length+ev.delta.long_term_facts.length);trace.push({kind:"memory",n})}
      if(ev.type==="done"){finalMsg=ev.message;const sc=ev.soFar.find(r=>r.data&&r.data.isScene);scene=sc?sc.data.scene:null;
        if(ev.soFar.some(r=>r.from==="planner"))panelTab="plans";
        if(ctx.state.draft)panelTab="drafts";}
    }
    hideWorking();addAI(finalMsg,trace,scene);if(wsView==="work")renderPanel();
    // If the brain offered to guide a physical plan with the camera, surface it.
    if(pendingOffer){const off=pendingOffer;pendingOffer=null;showCameraOffer(off);}
  }catch(e){hideWorking();addAI("Something broke in the loop. Try again?",null,null)}
  finally{busy=false;$("send").disabled=false;document.querySelectorAll(".chip").forEach(c=>c.disabled=false);setStatus(false,"Ready");$("input").focus()}
}

/* ============================ WIRING ================================== */
const SAMPLES=[["Greeting","hey there","text"],["Question","what's the capital of Japan?","text"],
  ["Plan a trip","help me plan a 2 week trip to Goa","text"],["Continue it","ok and what's next?","text"],
  ["Second plan","make a plan to learn guitar in 30 days","text"],
  ["Send email","send an email to Alex about Q3","text"],["Confirm draft","send it","text"],
  ["Remember a fact","I'm vegetarian and I run every morning","text"]];
$("samples").innerHTML=SAMPLES.map(([l,t,k])=>`<button class="chip" data-t="${esc(t).replace(/"/g,'&quot;')}" data-k="${k}">${l}</button>`).join("");
$("samples").querySelectorAll(".chip").forEach(c=>c.onclick=()=>send(c.dataset.t,c.dataset.k));
$("send").onclick=()=>send($("input").value,null);
$("input").addEventListener("keydown",e=>{if(e.key==="Enter")send($("input").value,null)});
/* attach + voice */
$("btnAttach").onclick=()=>$("fileInput").click();
$("fileInput").onchange=e=>{addFiles(e.target.files);e.target.value=""};
$("btnVoice").onclick=toggleComposerVoice;
/* drag & drop files anywhere onto the conversation */
const dropZone=$("stream");
["dragover","dragenter"].forEach(ev=>dropZone.addEventListener(ev,e=>{e.preventDefault();dropZone.classList.add("dropping")}));
["dragleave","drop"].forEach(ev=>dropZone.addEventListener(ev,e=>{e.preventDefault();if(ev!=="dragleave"||e.target===dropZone)dropZone.classList.remove("dropping")}));
dropZone.addEventListener("drop",e=>{if(e.dataTransfer&&e.dataTransfer.files.length)addFiles(e.dataTransfer.files)});

const app=$("app");
$("wsSeg").querySelectorAll(".seg").forEach(b=>b.onclick=()=>{
  wsView=b.dataset.view;
  $("wsSeg").querySelectorAll(".seg").forEach(x=>{const on=x.dataset.view===wsView;x.classList.toggle("on",on);x.classList.toggle("intel",on&&x.dataset.view==="vision")});
  $("viewWork").style.display=wsView==="work"?"flex":"none";
  $("viewVision").style.display=wsView==="vision"?"block":"none";
  if(wsView==="vision")renderVision();else renderPanel();
});
$("btnTrace").onclick=()=>{showTrace=!showTrace;$("btnTrace").classList.toggle("on",showTrace);applyTraceVisibility()};
function toggleWs(){if(window.innerWidth<=900)app.classList.toggle("ws-open");else{app.classList.toggle("no-ws");$("btnWs").classList.toggle("on",!app.classList.contains("no-ws"))}}
$("btnWs").onclick=toggleWs;
$("btnWsM").onclick=()=>app.classList.add("ws-open");
$("btnMenu").onclick=()=>$("rail").classList.toggle("open");
$("backdrop").onclick=()=>{app.classList.remove("ws-open");$("rail").classList.remove("open")};
$("btnBrief").onclick=openBriefing;
$("btnLogout").onclick=async()=>{
  if(!confirm("Sign out of DaVinci?"))return;
  try{await fetch("/api/auth/logout",{method:"POST",credentials:"include"});}catch(e){}
  window.location.href="/api/auth/google";
};
$("btnReset").onclick=()=>{ctx.state={plans:[],draft:null,claim:null};ctx.memory={preferences:{},past_patterns:[],long_term_facts:[]};stream.innerHTML="";panelTab="plans";renderPanel();greet()};

function greet(){addAI("I'm DaVinci. Ask me something, set a goal, or share a scene — I'll route it to the right part of me and answer in one voice.",null,null)}

/* On boot, hydrate the panel from the real backend (plans + memory) and check
   the session. If not signed in, prompt the Google login once. */
async function hydrate(){
  try{
    const me=await fetch("/api/me",{credentials:"include"});
    if(me.status===401){
      // Not signed in -> send straight to Google login. One-shot guard so an
      // origin where the session cookie can't be set won't loop forever.
      if(!sessionStorage.getItem("dv_auth_redirect")){
        sessionStorage.setItem("dv_auth_redirect","1");
        window.location.href="/api/auth/google";
        return;
      }
      addAI("Sign-in didn't complete. Open **/api/auth/google** in this tab to try again.",null,null);
      return;
    }
    // Signed in -> clear the one-shot guard and open the app normally.
    sessionStorage.removeItem("dv_auth_redirect");
    try{const u=await me.json();if(u&&u.email){ctx.user=u;const lo=$("btnLogout");if(lo){lo.style.display="";const tip=lo.querySelector(".tip");if(tip)tip.textContent="Sign out ("+(u.displayName||u.email)+")";}}}catch(e){}
  }catch(e){}
  try{
    const [pr,mr]=await Promise.all([
      fetch("/api/plans",{credentials:"include"}),
      fetch("/api/memory",{credentials:"include"}),
    ]);
    if(pr.ok){const j=await pr.json();if(Array.isArray(j.plans))ctx.state.plans=j.plans;}
    if(mr.ok){const m=await mr.json();ctx.memory={preferences:m.preferences||{},past_patterns:m.past_patterns||[],long_term_facts:m.long_term_facts||[]};}
    if(wsView==="work")renderPanel();
  }catch(e){}
  // Recall status + notifications hydrate in the background (non-blocking).
  recallStatus().then(()=>{if(wsView==="work"&&panelTab==="docs")renderPanel()});
  refreshNotifications();
}

/* boot with the brief load-skeleton moment */
renderPanel();
bootSkeleton();
setTimeout(()=>{stream.innerHTML="";app.classList.remove("booting");greet();hydrate();$("input").focus()},620);
</script>
